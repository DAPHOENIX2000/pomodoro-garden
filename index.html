<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Garden</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated}
:root{--sky:#87ceeb;--grass:#5a9e2f;--dark-grass:#3d7020;--soil:#8b5e3c;--dark-soil:#6b3f1f;--path:#c8a96e;--sun:#ffd700;--txt:#1a1a1a;--pixel:4px}
body{background:var(--sky);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;color:var(--txt)}

/* PIXEL SCENE */
.scene{position:relative;width:100%;height:240px;overflow:hidden;flex-shrink:0}
/* Sky gradient */
.scene-sky{position:absolute;inset:0;background:linear-gradient(180deg,#4a90d9 0%,#87ceeb 40%,#b8dff7 100%)}
/* Sun */
.sun{position:absolute;top:20px;right:80px;width:48px;height:48px;background:var(--sun);box-shadow:0 0 0 8px rgba(255,215,0,.3),0 0 0 16px rgba(255,215,0,.15);border-radius:0;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);animation:spin 20s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Clouds */
.cloud{position:absolute;background:#fff;opacity:.9}
.cloud1{width:80px;height:24px;top:30px;left:10%;animation:cloudMove 25s linear infinite}
.cloud2{width:60px;height:20px;top:50px;left:40%;animation:cloudMove 35s linear infinite}
.cloud3{width:100px;height:28px;top:20px;left:70%;animation:cloudMove 20s linear infinite}
@keyframes cloudMove{from{transform:translateX(0)}to{transform:translateX(110vw)}}
/* Ground layers */
.ground{position:absolute;bottom:0;left:0;right:0;height:100px;background:var(--grass)}
.ground::before{content:'';position:absolute;top:-8px;left:0;right:0;height:12px;background:var(--dark-grass)}
.soil-layer{position:absolute;bottom:0;left:0;right:0;height:60px;background:var(--soil);border-top:var(--pixel) solid var(--dark-soil)}
/* Path */
.path{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:100px;background:var(--path);border-left:var(--pixel) solid #b89558;border-right:var(--pixel) solid #b89558}
/* Pixel trees */
.tree{position:absolute;bottom:80px;display:flex;flex-direction:column;align-items:center}
.tree-top{background:#2d7a1f;width:32px;height:40px;clip-path:polygon(50% 0%,0% 100%,100% 100%)}
.tree-trunk{background:#8b5e3c;width:8px;height:16px}
.tree1{left:8%}.tree2{left:20%}.tree3{right:8%}.tree4{right:20%}
/* Fence */
.fence{position:absolute;bottom:96px;left:0;right:0;height:24px;display:flex;gap:8px;padding:0 16px}
.post{width:8px;height:24px;background:#c8a96e;border-top:4px solid #e8c98e;flex-shrink:0}

/* MAIN UI */
.ui{max-width:900px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:1fr 320px;gap:1.5rem}
@media(max-width:700px){.ui{grid-template-columns:1fr}}

/* TIMER PANEL */
.timer-panel{background:#fff;border:4px solid #333;box-shadow:6px 6px 0 #333;padding:1.5rem;border-radius:4px}
.tp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.tp-title{font-family:'Press Start 2P',monospace;font-size:.75rem;color:#333}
.mode-pills{display:flex;gap:4px}
.mp{border:2px solid #333;background:#f5f5f5;color:#333;font-family:'Press Start 2P',monospace;font-size:.45rem;padding:.4rem .6rem;cursor:pointer;transition:all .1s}
.mp:hover{background:#eee}
.mp.active{background:#5a9e2f;color:#fff;border-color:#3d7020}
/* BIG TIMER */
.timer-display{font-family:'Press Start 2P',monospace;font-size:3.5rem;color:#333;text-align:center;margin:1.5rem 0;letter-spacing:4px;line-height:1;position:relative}
.timer-display::after{content:attr(data-label);display:block;font-size:.45rem;color:#999;margin-top:.8rem;letter-spacing:2px}
/* Progress ring (pixel style = square) */
.prog-track{width:100%;height:12px;background:#eee;border:2px solid #333;margin-bottom:1.5rem;position:relative;overflow:hidden}
.prog-fill{height:100%;background:repeating-linear-gradient(90deg,#5a9e2f 0,#5a9e2f 12px,#3d7020 12px,#3d7020 24px);transition:width 1s linear}
/* Controls */
.controls{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap}
.ctrl-btn{border:3px solid #333;box-shadow:3px 3px 0 #333;font-family:'Press Start 2P',monospace;font-size:.6rem;padding:.7rem 1.2rem;cursor:pointer;transition:all .1s;background:#fff}
.ctrl-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #333}
.ctrl-btn.start{background:#5a9e2f;color:#fff;border-color:#3d7020;box-shadow:3px 3px 0 #3d7020}
.ctrl-btn.pause{background:#e8a020;color:#fff;border-color:#b87010;box-shadow:3px 3px 0 #b87010}
.ctrl-btn.reset{background:#e84040;color:#fff;border-color:#b02020;box-shadow:3px 3px 0 #b02020}
/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:1.2rem}
.stat-box{border:2px solid #333;padding:.7rem;text-align:center;background:#f9f9f9}
.stat-n{font-family:'Press Start 2P',monospace;font-size:1rem;color:#5a9e2f}
.stat-l{font-size:.6rem;color:#999;margin-top:.3rem;font-family:'Press Start 2P',monospace}
/* Wilt notice */
.wilt-notice{background:#e84040;color:#fff;border:2px solid #b02020;padding:.6rem 1rem;font-family:'Press Start 2P',monospace;font-size:.5rem;text-align:center;margin-top:.8rem;display:none;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* GARDEN PANEL */
.garden-panel{background:#fff;border:4px solid #333;box-shadow:6px 6px 0 #333;border-radius:4px;overflow:hidden}
.gp-header{background:#5a9e2f;border-bottom:4px solid #3d7020;padding:.8rem 1rem;display:flex;align-items:center;justify-content:space-between}
.gp-title{font-family:'Press Start 2P',monospace;font-size:.65rem;color:#fff}
.gp-count{font-family:'Press Start 2P',monospace;font-size:.6rem;color:rgba(255,255,255,.7)}
.plot-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:1rem;background:#f0e8d0}
.plot{aspect-ratio:1;background:#c8a96e;border:2px solid #a07848;display:flex;align-items:center;justify-content:center;font-size:1.4rem;transition:transform .2s;cursor:default;border-radius:2px}
.plot:hover{transform:scale(1.1)}
.plot.grow{animation:growpop .5s cubic-bezier(.36,.07,.19,.97)}
@keyframes growpop{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0deg)}}
.plot.wilt{animation:wiltanim .4s ease forwards}
@keyframes wiltanim{0%{transform:scale(1)}50%{transform:scale(.8) rotate(-5deg);opacity:.5}100%{transform:scale(.6);opacity:.2}}
/* Legend */
.gp-legend{padding:.7rem 1rem;border-top:2px solid #e8e0d0;display:flex;flex-wrap:wrap;gap:.5rem}
.leg{font-size:.55rem;color:#888;display:flex;align-items:center;gap:.3rem;font-family:'Press Start 2P',monospace}
/* Unlock messages */
.unlock-bar{background:#ffd700;border-top:2px solid #c8a900;padding:.5rem 1rem;font-family:'Press Start 2P',monospace;font-size:.5rem;color:#333;display:none;text-align:center}

/* PIXEL NOTIFICATION */
.pixel-toast{position:fixed;top:1rem;right:1rem;background:#333;color:#5a9e2f;border:3px solid #5a9e2f;font-family:'Press Start 2P',monospace;font-size:.55rem;padding:.7rem 1rem;transform:translateX(200px);transition:transform .3s;z-index:100;max-width:200px;text-align:center;line-height:1.6}
.pixel-toast.show{transform:translateX(0)}
</style>
</head>
<body>

<!-- PIXEL SCENE -->
<div class="scene">
  <div class="scene-sky"></div>
  <div class="sun"></div>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="ground">
    <div class="soil-layer"></div>
    <div class="path"></div>
    <div class="fence" id="fence"></div>
  </div>
  <div class="tree tree1"><div class="tree-top"></div><div class="tree-trunk"></div></div>
  <div class="tree tree2"><div class="tree-top"></div><div class="tree-trunk"></div></div>
  <div class="tree tree3"><div class="tree-top"></div><div class="tree-trunk"></div></div>
  <div class="tree tree4"><div class="tree-top"></div><div class="tree-trunk"></div></div>
</div>

<!-- MAIN UI -->
<div class="ui">
  <div class="timer-panel">
    <div class="tp-header">
      <div class="tp-title">TIMER</div>
      <div class="mode-pills">
        <button class="mp active" onclick="setMode('focus',25,this)">🍅 25m</button>
        <button class="mp" onclick="setMode('short',5,this)">☕ 5m</button>
        <button class="mp" onclick="setMode('long',15,this)">🌿 15m</button>
      </div>
    </div>

    <div class="timer-display" id="display" data-label="FOCUS TIME">25:00</div>
    <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0%"></div></div>

    <div class="controls">
      <button class="ctrl-btn start" id="start-btn" onclick="toggleTimer()">▶ START</button>
      <button class="ctrl-btn reset" onclick="resetTimer()">↺ RESET</button>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-n" id="s-sess">0</div><div class="stat-l">SESSIONS</div></div>
      <div class="stat-box"><div class="stat-n" id="s-min">0</div><div class="stat-l">MINUTES</div></div>
      <div class="stat-box"><div class="stat-n" id="s-streak">0</div><div class="stat-l">STREAK</div></div>
    </div>
    <div class="wilt-notice" id="wilt">⚠ PLANT WILTED! You quit too early!</div>
  </div>

  <div class="garden-panel">
    <div class="gp-header">
      <div class="gp-title">🌱 YOUR GARDEN</div>
      <div class="gp-count" id="gp-count">0 / 24 plants</div>
    </div>
    <div class="plot-grid" id="plot-grid"></div>
    <div class="unlock-bar" id="unlock-bar"></div>
    <div class="gp-legend">
      <div class="leg">🌱 New</div>
      <div class="leg">🌿 3 sess</div>
      <div class="leg">🌸 5 sess</div>
      <div class="leg">🌻 10 sess</div>
      <div class="leg">🍀 15 sess</div>
      <div class="leg">🌳 20 sess</div>
    </div>
  </div>
</div>

<div class="pixel-toast" id="toast"></div>

<script>
const PLANTS_BY_SESS=[[0],'🌱',[3],'🌿',[5],'🌸',[10],'🌻',[15],'🍀',[20],'🌳'];
const PLANT_UNLOCKS={3:'🌿 Sprout unlocked!',5:'🌸 Flower unlocked!',10:'🌻 Sunflower unlocked!',15:'🍀 Clover unlocked!',20:'🌳 Tree unlocked!'};
const ALL_PLANTS=['🌱','🌿','🌸','🌺','🌻','🍀','🌹','🌷','🌵','🎋','🍄','🌾','🌼','🎍','🪴'];

let mode='focus',total=25*60,remaining=25*60,running=false,interval=null,startedFocus=false;
let plants=JSON.parse(localStorage.getItem('pg3_plants')||'[]');
let sessions=+localStorage.getItem('pg3_sess')||0;
let totalMin=+localStorage.getItem('pg3_min')||0;
let streak=+localStorage.getItem('pg3_streak')||0;
let lastDay=localStorage.getItem('pg3_lastday')||'';
const CIRC=100;

// Build fence posts
const fence=document.getElementById('fence');
for(let i=0;i<30;i++){const p=document.createElement('div');p.className='post';fence.appendChild(p)}

function setMode(m,mins,btn){
  if(running)resetTimer();
  mode=m;total=mins*60;remaining=total;
  document.querySelectorAll('.mp').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const labels={focus:'FOCUS TIME',short:'SHORT BREAK',long:'LONG BREAK'};
  document.getElementById('display').dataset.label=labels[m];
  const fills={focus:'#5a9e2f',short:'#3b82f6',long:'#8b5cf6'};
  document.getElementById('pfill').style.background=`repeating-linear-gradient(90deg,${fills[m]} 0,${fills[m]} 12px,${fills[m]}bb 12px,${fills[m]}bb 24px)`;
  updateDisplay();
}

function toggleTimer(){
  if(running){pauseTimer()}else{startTimer()}
}
function startTimer(){
  running=true;if(mode==='focus')startedFocus=true;
  document.getElementById('start-btn').textContent='⏸ PAUSE';
  document.getElementById('start-btn').className='ctrl-btn pause';
  interval=setInterval(tick,1000);
}
function pauseTimer(){
  running=false;clearInterval(interval);
  document.getElementById('start-btn').textContent='▶ RESUME';
  document.getElementById('start-btn').className='ctrl-btn start';
}
function resetTimer(){
  if(running&&startedFocus&&mode==='focus'&&remaining<total-30){wiltPlant()}
  running=false;startedFocus=false;clearInterval(interval);remaining=total;
  document.getElementById('start-btn').textContent='▶ START';
  document.getElementById('start-btn').className='ctrl-btn start';
  updateDisplay();
}
function tick(){
  remaining--;updateDisplay();
  if(remaining<=0)complete();
}
function complete(){
  clearInterval(interval);running=false;startedFocus=false;
  document.getElementById('start-btn').textContent='▶ START';
  document.getElementById('start-btn').className='ctrl-btn start';
  if(mode==='focus'){
    sessions++;totalMin+=25;
    localStorage.setItem('pg3_sess',sessions);
    localStorage.setItem('pg3_min',totalMin);
    updateStreak();growPlant();
  }
  remaining=total;updateDisplay();
  showToast(mode==='focus'?'🌱 Session done!\nA plant grew!':'✓ Break over!\nBack to focus.');
}
function updateDisplay(){
  const m=Math.floor(remaining/60).toString().padStart(2,'0');
  const s=(remaining%60).toString().padStart(2,'0');
  document.getElementById('display').textContent=`${m}:${s}`;
  const pct=(1-remaining/total)*100;
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('s-sess').textContent=sessions;
  document.getElementById('s-min').textContent=totalMin;
  document.getElementById('s-streak').textContent=streak;
}
function getPlantEmoji(){
  const thresholds=[[20,'🌳'],[15,'🍀'],[10,'🌻'],[5,'🌸'],[3,'🌿'],[0,'🌱']];
  for(const[t,e]of thresholds)if(sessions>=t)return e;
  return'🌱';
}
function growPlant(){
  const emoji=ALL_PLANTS[Math.floor(Math.random()*ALL_PLANTS.length)];
  plants.push(emoji);if(plants.length>24)plants.shift();
  localStorage.setItem('pg3_plants',JSON.stringify(plants));
  // Check unlocks
  const unlock=PLANT_UNLOCKS[sessions];
  if(unlock){const ub=document.getElementById('unlock-bar');ub.textContent=`🎉 ${unlock}`;ub.style.display='block';setTimeout(()=>ub.style.display='none',3000)}
  renderGarden(true);
}
function wiltPlant(){
  if(plants.length){plants.pop();localStorage.setItem('pg3_plants',JSON.stringify(plants));
  const w=document.getElementById('wilt');w.style.display='block';setTimeout(()=>w.style.display='none',3000);renderGarden(false)}
}
function updateStreak(){
  const today=new Date().toDateString(),yest=new Date(Date.now()-86400000).toDateString();
  if(lastDay===today)return;
  streak=lastDay===yest?streak+1:1;lastDay=today;
  localStorage.setItem('pg3_streak',streak);localStorage.setItem('pg3_lastday',today);
}
function renderGarden(animate){
  const grid=document.getElementById('plot-grid');
  grid.innerHTML=Array.from({length:24},(_,i)=>{
    const p=plants[i]||'';
    const cls=animate&&i===plants.length-1?'plot grow':'plot';
    return`<div class="${cls}" title="${p?'Click to water':'Empty plot'}">${p}</div>`;
  }).join('');
  document.getElementById('gp-count').textContent=`${plants.length} / 24 plants`;
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

renderGarden(false);updateDisplay();
</script>
</body>
</html>
